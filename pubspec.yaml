name: friend_tracker
description: 친구를 추적하자! 친구들의 실시간 위치를 게임 맵처럼 볼 수 있는 앱

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.0

  # Maps (no API key required - uses OpenStreetMap/CARTO)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Location
  geolocator: ^13.0.1

  # Notifications
  flutter_local_notifications: ^17.2.3

  # FaceTime / URL Launcher
  url_launcher: ^6.3.1

  # Permissions
  permission_handler: ^11.3.1

  # State Management
  provider: ^6.1.2

  # Utils
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.3
  image_picker: ^1.1.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/app_icon.png
